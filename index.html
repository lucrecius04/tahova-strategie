<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Tahová středověká strategie</title>
  <style>
    :root {
      --bg: #1b1915;
      --card: #2e2a24;
      --text: #f5f1e8;
      --grid-gap: 6px;
      --alt: #3f372f;
      --highlight: #bfa34a;
      --red: #c65a47;
      --green: #7bb26b;
      --blue: #4a7ab2;
      --shadow: rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #4d523c 0%, #1b1915 55%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
    }
    h1 { margin: 0; font-size: clamp(2rem, 3vw, 3rem); }
    p { margin: 8px 0 0; color: #d7c9ae; }

    .status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 18px 0 24px;
    }
    .panel {
      background: rgba(30, 28, 24, 0.92);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 35px var(--shadow);
    }
    .panel strong { display: block; margin-bottom: 8px; color: var(--highlight); }
    .panel button {
      margin-top: 12px;
      width: 100%;
      border: none;
      background: var(--highlight);
      color: #1b1915;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .panel button:hover { filter: brightness(1.05); }

    .board {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      justify-items: center;
      gap: var(--grid-gap);
      padding-bottom: 20px;
    }
    .row-offset { margin-left: calc(40px + var(--grid-gap) / 2); }
    .hex {
      position: relative;
      width: 80px;
      height: 92px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .hex:hover { transform: translateY(-4px); }
    .hex::before,
    .hex::after {
      content: "";
      position: absolute;
      width: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
    }
    .hex::before {
      bottom: 100%;
      border-bottom: 20px solid;
      border-bottom-color: inherit;
    }
    .hex::after {
      top: 100%;
      border-top: 20px solid;
      border-top-color: inherit;
    }
    .tile {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 2px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 8px;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }
    .tile::before {
      content: attr(data-terrain);
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 0.7rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .tile[data-terrain="Pole"] { background-color: #3f422d; }
    .tile[data-terrain="Les"] { background-color: #34432f; }
    .tile[data-terrain="Kopec"] { background-color: #4f4232; }
    .tile[data-terrain="Hrad"] { background-color: #4b4553; }
    .tile.highlight { border-color: #f5dd7a; box-shadow: 0 0 0 4px rgba(191,163,74,0.55); }
    .tile.move-target {
      border-color: #7bb26b;
      box-shadow: 0 0 0 4px rgba(122, 178, 107, 0.5);
      background-color: rgba(122, 178, 107, 0.22) !important;
    }
    .tile.attack-target {
      border-color: #c65a47;
      box-shadow: 0 0 0 4px rgba(198, 90, 71, 0.5);
      background-color: rgba(198, 90, 71, 0.2) !important;
    }
    .tile.heal-target {
      border-color: #5ba8c9;
      box-shadow: 0 0 0 4px rgba(91, 168, 201, 0.55);
      background-color: rgba(91, 168, 201, 0.2) !important;
    }
    .castle-marker {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 1rem;
      line-height: 1;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.7));
      pointer-events: none;
    }
    .castle-marker.owner-1 { text-shadow: 0 0 8px #d9be83; }
    .castle-marker.owner-2 { text-shadow: 0 0 8px #739cc6; }

    /* ── Fog of War ── */
    .hex.fog-hidden  { pointer-events: none; }
    .hex.fog-hidden .tile  { filter: brightness(0.07); }
    .hex.fog-explored { pointer-events: none; }
    .hex.fog-explored .tile {
      filter: grayscale(1) brightness(0.42);
      transition: filter 0.3s;
    }
    .unit.ghost {
      opacity: 0.3;
      filter: grayscale(1);
    }
    @keyframes attack-flash {
      0%   { background-color: rgba(198, 90, 71, 0); }
      20%  { background-color: rgba(198, 90, 71, 0.85); box-shadow: 0 0 0 6px rgba(198,90,71,0.6); }
      100% { background-color: rgba(198, 90, 71, 0); box-shadow: none; }
    }
    .tile.flash-hit {
      animation: attack-flash 0.5s ease-out forwards;
    }

    .unit {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      font-weight: 800;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.16), 0 12px 26px rgba(0,0,0,.25);
    }
    .unit-stars {
      position: absolute;
      top: -11px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.52rem;
      line-height: 1;
      white-space: nowrap;
      filter: drop-shadow(0 0 3px rgba(0,0,0,.9));
      pointer-events: none;
    }
    .unit.rank-legend {
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.16), 0 12px 26px rgba(0,0,0,.25),
                  0 0 0 3px rgba(255,215,0,0.55), 0 0 14px rgba(255,180,0,0.35);
    }
    .unit.player1 { background: linear-gradient(135deg, #8b6f48, #d9be83); color: #1b1210; }
    .unit.player2 { background: linear-gradient(135deg, #3a5f87, #739cc6); color: #f9f6ef; }
    .unit span {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: rgba(20,20,20,0.9);
      color: #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      font-size: 0.75rem;
    }
    .tooltip {
      font-size: 0.9rem;
      padding: 10px 12px;
      background: rgba(22,20,18,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px;
    }
    .footer {
      margin-top: 16px;
      color: #b7ae9f;
      text-align: center;
      font-size: 0.92rem;
    }

    /* ── Weather ── */
    .board-container { position: relative; }
    .weather-badge {
      position: absolute;
      top: -6px;
      right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(28,25,20,0.94);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 8px 16px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .weather-badge .w-icon { font-size: 1.7rem; line-height: 1; }
    .weather-badge .w-name { font-weight: 700; font-size: 0.95rem; color: var(--highlight); }
    .weather-badge .w-timer { font-size: 0.72rem; color: #9a9080; margin-top: 2px; }
    .weather-badge .w-desc  { font-size: 0.72rem; color: #b7ae9f; margin-top: 1px; max-width: 160px; }

    .weather-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 300;
    }
    .weather-announce {
      background: rgba(12,10,8,0.93);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 22px;
      padding: 22px 52px;
      font-size: 1.9rem;
      font-weight: 800;
      color: #f5f1e8;
      text-align: center;
      opacity: 0;
      transform: scale(0.78) translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      text-shadow: 0 2px 12px rgba(0,0,0,.6);
      letter-spacing: 0.02em;
    }
    .weather-announce.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Středověká tahová strategie</h1>
      <p>9×9 hex mapa, dva hráči, rytíř, lučištník a kopinář. Vyhraj ten, kdo zůstane poslední.</p>
    </header>

    <div class="status">
      <div class="panel">
        <strong>Aktuální tah</strong>
        <div id="turnText">Hráč 1 (žlutý)</div>
        <div class="tooltip" id="message">Vyber svou jednotku a poté cíl.</div>
      </div>
      <div class="panel">
        <strong>Jednotky</strong>
        <div id="unitStatus"></div>
        <button id="aiToggle">AI: Zapnuto</button>
        <button id="restartButton">Restartovat hru</button>
      </div>
    </div>

    <div class="board-container">
      <div class="weather-badge" id="weatherBadge">
        <div class="w-icon" id="wIcon">☀️</div>
        <div>
          <div class="w-name" id="wName">Jasno</div>
          <div class="w-desc" id="wDesc">Žádné efekty.</div>
          <div class="w-timer" id="wTimer">Za 5 tahů se změní</div>
        </div>
      </div>
      <div id="board" class="board"></div>
    </div>

    <div class="weather-overlay" id="weatherOverlay">
      <div class="weather-announce" id="weatherAnnounce"></div>
    </div>

    <div class="footer">Středověká tahová strategie — počasí, mlha, hrady a AI protivník.</div>
  </main>

  <script>
    const terrainTypes = ["Pole", "Les", "Kopec", "Hrad"];
    const mapTemplate = [
      [0,0,1,1,0,0,2,0,0],
      [0,1,0,2,0,1,0,1,0],
      [1,0,3,0,2,0,0,0,1],
      [0,2,0,0,1,0,0,2,0],
      [0,0,2,1,0,1,2,0,0],
      [1,0,0,0,2,0,0,0,1],
      [0,1,0,2,0,1,3,1,0],
      [0,0,1,1,0,0,2,0,0],
      [1,0,0,0,1,0,0,0,1]
    ];

    const baseUnits = [
      { type: 'Rytíř',     move: 3, attack: 3, range: 1, hp: 10, symbol: '⚔' },
      { type: 'Lučištník', move: 2, attack: 2, range: 2, hp: 6,  symbol: '🏹' },
      { type: 'Kopinář',   move: 2, attack: 2, range: 1, hp: 8,  symbol: '🛡' },
      { type: 'Katapult',  move: 1, attack: 4, range: 3, hp: 6,  symbol: '💣' },
      { type: 'Kněz',      move: 2, attack: 0, range: 1, hp: 5,  symbol: '✝' }
    ];

    // ── Weather constants ────────────────────────────────────────────────────
    const WEATHER_TYPES = [
      { id: 'jasno',    name: 'Jasno',    icon: '☀️',  desc: 'Žádné efekty.' },
      { id: 'dest',     name: 'Déšť',     icon: '🌧️', desc: 'Pohyb −1, Katapult nemůže útočit.' },
      { id: 'mlha',     name: 'Mlha',     icon: '🌫️', desc: 'Dosah střelců →1, viditelnost −1.' },
      { id: 'boure',    name: 'Bouře',    icon: '⛈️',  desc: 'Pohyb −1, dosah −1, kopec: −1 HP.' },
      { id: 'slunecno', name: 'Sluníčko', icon: '🌞', desc: 'Pohyb +1, morálka +1 HP.' },
    ];
    const WEATHER_ANNOUNCES = {
      jasno:    '☀️ Obloha se vyčasuje!',
      dest:     '🌧️ Přichází déšť!',
      mlha:     '🌫️ Houstne mlha…',
      boure:    '⛈️ Přichází bouře!',
      slunecno: '🌞 Vychází sluníčko!',
    };
    const WEATHER_CHANGE_INTERVAL = 5; // po tolika tazích hráče 1

    // ── Veteran system constants ─────────────────────────────────────────────
    const RANK_KILLS    = [0, 2, 4, 6];
    const RANK_NAMES    = ['Rekrut', 'Veterán', 'Elita', 'Legenda'];
    const RANK_ICONS    = ['', '⭐', '⭐⭐', '⭐⭐⭐'];
    const NICKNAMES = {
      'Rytíř':     ['Rytíř smrti', 'Rudý rytíř', 'Železný rytíř', 'Temný rytíř'],
      'Lučištník': ['Stínový lučištník', 'Orlí oko', 'Nemilosrdný lučištník', 'Tichý lovec'],
      'Kopinář':   ['Železný kopinář', 'Krvavá kopí', 'Neústupný kopinář', 'Strážce bran'],
      'Katapult':  ['Ničitel hradeb', 'Hromobití', 'Bouřlivý katapult', 'Hlas zkázy'],
      'Kněz':      ['Svatý léčitel', 'Věčný kněz', 'Kněz duší', 'Stínolamač'],
    };
    // ────────────────────────────────────────────────────────────────────────

    const boardElement = document.getElementById('board');
    const turnText = document.getElementById('turnText');
    const message = document.getElementById('message');
    const unitStatus = document.getElementById('unitStatus');
    const restartButton = document.getElementById('restartButton');
    const aiToggleBtn = document.getElementById('aiToggle');

    let hexes = [];
    let units = [];
    let castles = [];
    let currentPlayer = 1;
    let selectedUnit = null;
    let validMoves = [];
    let validAttacks = [];
    let validHeals = [];
    let aiEnabled = true;
    let aiThinking = false;

    // Weather
    let currentWeather = WEATHER_TYPES[0];
    let weatherTurnCounter = 0; // counts player-1 turns

    // Fog of War
    let explored = { 1: new Set(), 2: new Set() };   // hexes ever seen
    let lastKnownEnemies = { 1: new Map(), 2: new Map() }; // key -> unit snapshot
    let currentVisible = new Set(); // recomputed each render

    function createGame() {
      hexes = [];
      units = [];
      castles = [
        { x: 2, y: 2, owner: 1 },
        { x: 6, y: 6, owner: 2 }
      ];
      currentPlayer = 1;
      selectedUnit = null;
      validMoves = [];
      validAttacks = [];
      validHeals = [];
      aiThinking = false;
      explored = { 1: new Set(), 2: new Set() };
      lastKnownEnemies = { 1: new Map(), 2: new Map() };
      currentVisible = new Set();
      currentWeather = WEATHER_TYPES[0];
      weatherTurnCounter = 0;
      updateWeatherUI();
      boardElement.innerHTML = '';

      for (let y = 0; y < 9; y++) {
        const rowOffset = document.createElement('div');
        rowOffset.className = y % 2 === 1 ? 'row-offset' : '';
        rowOffset.style.display = 'contents';
        for (let x = 0; x < 9; x++) {
          const hex = document.createElement('div');
          hex.className = 'hex';
          hex.dataset.x = x;
          hex.dataset.y = y;

          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.dataset.terrain = terrainTypes[mapTemplate[y][x]];
          tile.style.backgroundColor = '';
          hex.appendChild(tile);
          boardElement.appendChild(hex);
          hexes.push({ x, y, el: hex, tile, unit: null });

          hex.addEventListener('click', () => selectHex(x, y));
        }
      }
      placeUnits();
      updateStatus();
      renderBoard();
    }

    function placeUnits() {
      const initialPositions = [
        [{x:0,y:0},{x:2,y:0},{x:0,y:2},{x:3,y:1},{x:1,y:3}],
        [{x:8,y:8},{x:6,y:8},{x:8,y:6},{x:5,y:7},{x:7,y:5}]
      ];
      for (let player = 1; player <= 2; player++) {
        initialPositions[player - 1].forEach((pos, index) => {
          const base = baseUnits[index];
          const unit = {
            id: `${player}-${index}`,
            player,
            x: pos.x,
            y: pos.y,
            type: base.type,
            move: base.move,
            attack: base.attack,
            range: base.range,
            hp: base.hp,
            maxHp: base.hp,
            symbol: base.symbol,
            moved: false,
            attacked: false,
            kills: 0,
            rank: 0,
            nickname: null,
          };
          units.push(unit);
          getHex(pos.x, pos.y).unit = unit;
        });
      }
    }

    function getHex(x, y) {
      return hexes.find(cell => cell.x === x && cell.y === y);
    }

    function getTerrainAt(x, y) {
      return terrainTypes[mapTemplate[y][x]];
    }

    function getCastleAt(x, y) {
      return castles.find(c => c.x === x && c.y === y) || null;
    }

    function selectHex(x, y) {
      if (aiThinking) return;
      if (checkGameOver()) return;
      const hex = getHex(x, y);
      const unit = hex.unit;

      // Priest healing
      if (selectedUnit && selectedUnit.type === 'Kněz' && unit && unit.player === currentPlayer && unit.id !== selectedUnit.id) {
        if (validHeals.some(h => h.x === x && h.y === y)) {
          healUnit(selectedUnit, unit);
          return;
        }
      }

      if (selectedUnit && unit && unit.player !== currentPlayer && canAttack(selectedUnit, unit)) {
        performAttack(selectedUnit, unit);
        return;
      }

      if (unit && unit.player === currentPlayer) {
        selectUnit(unit);
        return;
      }

      if (selectedUnit && canMoveTo(selectedUnit, x, y)) {
        moveUnit(selectedUnit, x, y);
        return;
      }

      setMessage('Vyber svou jednotku nebo cílové políčko pro přesun.');
    }

    function selectUnit(unit) {
      selectedUnit = unit;
      validMoves = calculateMoveTargets(unit);
      validAttacks = calculateAttackTargets(unit);
      validHeals = calculateHealTargets(unit);
      const extra = unit.type === 'Kněz' ? ' Může léčit spojence (klikni na ně).' : '';
      setMessage(`Vybrán ${unit.type}. Pohyb: ${unit.move}, Útok: ${unit.attack}, Dosah: ${unit.range}.${extra}`);
      renderBoard();
    }

    function canMoveTo(unit, x, y) {
      return validMoves.some(pos => pos.x === x && pos.y === y);
    }

    function canAttack(attacker, target) {
      return validAttacks.some(pos => pos.x === target.x && pos.y === target.y) && target.player !== attacker.player;
    }

    function flashTile(x, y) {
      const hex = getHex(x, y);
      if (!hex) return;
      hex.tile.classList.remove('flash-hit');
      void hex.tile.offsetWidth; // force reflow to restart animation
      hex.tile.classList.add('flash-hit');
      hex.tile.addEventListener('animationend', () => hex.tile.classList.remove('flash-hit'), { once: true });
    }

    function performAttack(attacker, defender) {
      const baseAtk = attacker.attack + (attacker.type === 'Rytíř' ? 1 : 0);
      const atkBonus = getTerrainAt(attacker.x, attacker.y) === 'Kopec' ? 1 : 0;
      const defBonus = getTerrainAt(defender.x, defender.y) === 'Les' ? 1 : 0;
      const castleBonus = getCastleAt(defender.x, defender.y) ? 2 : 0;
      const damage = Math.max(0, baseAtk + atkBonus - defBonus - castleBonus);

      flashTile(defender.x, defender.y);
      defender.hp = Math.max(0, defender.hp - damage);
      attacker.attacked = true;

      const bonusInfo = [];
      if (atkBonus)    bonusInfo.push('+1 útok (kopec)');
      if (defBonus)    bonusInfo.push('-1 pošk. (les)');
      if (castleBonus) bonusInfo.push('-2 pošk. (hrad)');
      const info = bonusInfo.length ? ` [${bonusInfo.join(', ')}]` : '';
      setMessage(`${attacker.type} útočí na ${defender.type}: ${damage} poškození.${info}`);

      if (defender.hp <= 0) {
        attacker.kills += 1;
        checkPromotion(attacker);
        setTimeout(() => {
          removeUnit(defender);
          const defName = defender.nickname || defender.type;
          setMessage(`${attacker.nickname || attacker.type} poráží ${defName}!`);
          renderBoard();
        }, 300);
      }
      endTurn();
    }

    function healUnit(healer, target) {
      target.hp = Math.min(target.maxHp, target.hp + 3);
      healer.attacked = true;
      setMessage(`Kněz léčí ${target.type} o 3 HP (${target.hp}/${target.maxHp}).`);
      endTurn();
    }

    function checkPromotion(unit) {
      for (let r = 3; r >= 1; r--) {
        if (unit.kills >= RANK_KILLS[r] && unit.rank < r) {
          promoteUnit(unit, r);
          return;
        }
      }
    }

    function promoteUnit(unit, newRank) {
      unit.rank = newRank;
      unit.attack += 1;
      if (newRank === 2) {
        unit.maxHp += 1;
        unit.hp = Math.min(unit.hp + 1, unit.maxHp);
      }
      if (newRank === 3) {
        const pool = NICKNAMES[unit.type] || ['Legendární bojovník'];
        unit.nickname = pool[Math.floor(Math.random() * pool.length)];
      }
      const displayName = unit.nickname || unit.type;
      showAnnounce(`${displayName} povýšen na ${RANK_NAMES[newRank]}! ${RANK_ICONS[newRank]}`, 3200);
    }

    function moveUnit(unit, x, y) {
      const start = getHex(unit.x, unit.y);
      const dest = getHex(x, y);
      if (dest.unit) return;
      start.unit = null;
      dest.unit = unit;
      unit.x = x;
      unit.y = y;
      unit.moved = true;

      const castle = getCastleAt(x, y);
      if (castle && castle.owner !== unit.player) {
        castle.owner = unit.player;
        setMessage(`${unit.type} dobývá hrad! Patří nyní Hráči ${unit.player}.`);
      } else {
        setMessage(`${unit.type} se přemístil.`);
      }
      endTurn();
    }

    function removeUnit(unit) {
      const hex = getHex(unit.x, unit.y);
      if (hex) hex.unit = null;
      units = units.filter(item => item.id !== unit.id);
      if (selectedUnit?.id === unit.id) selectedUnit = null;
    }

    function endTurn() {
      validMoves = [];
      validAttacks = [];
      validHeals = [];
      selectedUnit = null;
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      units.forEach(unit => {
        if (unit.player === currentPlayer) {
          unit.moved = false;
          unit.attacked = false;
        }
      });

      // Weather turn counter advances when player 1 starts their turn
      if (currentPlayer === 1) {
        weatherTurnCounter++;
        if (weatherTurnCounter >= WEATHER_CHANGE_INTERVAL) {
          changeWeather();
        } else {
          updateWeatherUI();
        }
      }

      // Apply start-of-turn weather effects (lightning, sunshine)
      applyWeatherStartOfTurn(currentPlayer);

      updateStatus();
      renderBoard();
      if (checkGameOver()) return;
      if (currentPlayer === 2 && aiEnabled) {
        aiThinking = true;
        setMessage('AI přemýšlí…');
        setTimeout(aiTurn, 750);
      }
    }

    function aiTurn() {
      aiThinking = false;
      if (checkGameOver()) return;

      const aiUnits = units.filter(u => u.player === 2);

      // Priority 1: Priest heals most damaged ally
      for (const unit of aiUnits) {
        if (unit.type !== 'Kněz') continue;
        const heals = calculateHealTargets(unit);
        if (heals.length > 0) {
          const targets = units.filter(u => heals.some(h => h.x === u.x && h.y === u.y));
          targets.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
          healUnit(unit, targets[0]);
          return;
        }
      }

      // Priority 2: Attack — prefer weakest, avoid Legends if possible
      for (const unit of aiUnits) {
        const attacks = calculateAttackTargets(unit);
        if (attacks.length > 0) {
          const targets = units.filter(u => attacks.some(a => a.x === u.x && a.y === u.y));
          targets.sort((a, b) => {
            const aLeg = a.rank === 3, bLeg = b.rank === 3;
            if (aLeg !== bLeg) return aLeg ? 1 : -1; // avoid Legends
            return a.hp - b.hp; // prefer weakest
          });
          performAttack(unit, targets[0]);
          return;
        }
      }

      // Priority 3: Capture enemy castle
      const enemyCastles = castles.filter(c => c.owner !== 2);
      if (enemyCastles.length > 0) {
        for (const unit of aiUnits) {
          if (unit.type === 'Kněz') continue;
          const moves = calculateMoveTargets(unit);
          const target = enemyCastles.reduce((best, c) =>
            hexDistance(unit, c) < hexDistance(unit, best) ? c : best, enemyCastles[0]);
          if (moves.some(m => m.x === target.x && m.y === target.y)) {
            moveUnit(unit, target.x, target.y);
            return;
          }
        }
      }

      // Priority 4: Move toward nearest enemy (Katapult stays back, Kněz stays back)
      const enemies = units.filter(u => u.player === 1);
      if (enemies.length === 0) return;

      let bestUnit = null, bestMove = null, bestDist = Infinity;
      for (const unit of aiUnits) {
        if (unit.type === 'Katapult' || unit.type === 'Kněz') continue;
        const moves = calculateMoveTargets(unit);
        if (moves.length === 0) continue;
        const nearestEnemy = enemies.reduce((best, e) =>
          hexDistance(unit, e) < hexDistance(unit, best) ? e : best, enemies[0]);
        for (const mv of moves) {
          const d = hexDistance(mv, nearestEnemy);
          if (d < bestDist) { bestDist = d; bestMove = mv; bestUnit = unit; }
        }
      }
      if (bestUnit && bestMove) { moveUnit(bestUnit, bestMove.x, bestMove.y); return; }

      endTurn();
    }

    function checkGameOver() {
      const p1 = units.filter(u => u.player === 1).length;
      const p2 = units.filter(u => u.player === 2).length;
      if (p1 === 0) { declareWinner('Hráč 2 (modrý)'); return true; }
      if (p2 === 0) { declareWinner('Hráč 1 (žlutý)'); return true; }
      const p1Castles = castles.filter(c => c.owner === 1).length;
      const p2Castles = castles.filter(c => c.owner === 2).length;
      if (p1Castles === castles.length) { declareWinner('Hráč 1 (žlutý) — ovládá oba hrady'); return true; }
      if (p2Castles === castles.length) { declareWinner('Hráč 2 (modrý) — ovládá oba hrady'); return true; }
      return false;
    }

    function declareWinner(winner) {
      turnText.textContent = `${winner} vyhrává!`;
      setMessage(`Konec hry. Vítěz: ${winner}.`);
    }

    function calculateMoveTargets(unit) {
      const effectiveMove = Math.max(1, unit.move + weatherMoveBonus());
      const visited = new Set();
      const targets = [];
      const queue = [{ x: unit.x, y: unit.y, cost: 0 }];
      while (queue.length) {
        const current = queue.shift();
        const key = `${current.x},${current.y}`;
        if (visited.has(key) || current.cost > effectiveMove) continue;
        visited.add(key);
        if (!(current.x === unit.x && current.y === unit.y) && !getHex(current.x, current.y).unit) {
          targets.push({ x: current.x, y: current.y });
        }
        neighbors(current.x, current.y).forEach(nb => {
          const nextKey = `${nb.x},${nb.y}`;
          if (visited.has(nextKey)) return;
          if (getHex(nb.x, nb.y).unit && !(nb.x === unit.x && nb.y === unit.y)) return;
          if (current.cost + 1 <= effectiveMove) queue.push({ x: nb.x, y: nb.y, cost: current.cost + 1 });
        });
      }
      return targets;
    }

    function calculateAttackTargets(unit) {
      if (unit.attack === 0) return [];
      if (currentWeather.id === 'dest' && unit.type === 'Katapult') return [];
      const effectiveRange = weatherEffectiveRange(unit);
      const targets = [];
      units.forEach(enemy => {
        if (enemy.player === unit.player) return;
        const dist = hexDistance(unit, enemy);
        if (dist <= effectiveRange) targets.push({ x: enemy.x, y: enemy.y });
      });
      return targets;
    }

    function calculateHealTargets(unit) {
      if (unit.type !== 'Kněz') return [];
      const targets = [];
      units.forEach(ally => {
        if (ally.player !== unit.player || ally.id === unit.id) return;
        const dist = hexDistance(unit, ally);
        if (dist <= unit.range && ally.hp < ally.maxHp) targets.push({ x: ally.x, y: ally.y });
      });
      return targets;
    }

    function hexDistance(a, b) {
      const ac = offsetToCube(a.x, a.y);
      const bc = offsetToCube(b.x, b.y);
      return (Math.abs(ac.x - bc.x) + Math.abs(ac.y - bc.y) + Math.abs(ac.z - bc.z)) / 2;
    }

    function offsetToCube(x, y) {
      const col = x;
      const row = y;
      const x_cube = col - (row - (row & 1)) / 2;
      const z_cube = row;
      const y_cube = -x_cube - z_cube;
      return { x: x_cube, y: y_cube, z: z_cube };
    }

    // ── Weather helpers ──────────────────────────────────────────────────────

    function weatherMoveBonus() {
      if (currentWeather.id === 'dest' || currentWeather.id === 'boure') return -1;
      if (currentWeather.id === 'slunecno') return 1;
      return 0;
    }

    function weatherEffectiveRange(unit) {
      if (currentWeather.id === 'mlha' && (unit.type === 'Lučištník' || unit.type === 'Katapult'))
        return 1;
      if (currentWeather.id === 'boure') return Math.max(1, unit.range - 1);
      return unit.range;
    }

    function weatherSightBonus() {
      return currentWeather.id === 'mlha' ? -1 : 0;
    }

    function applyWeatherStartOfTurn(player) {
      if (currentWeather.id === 'boure') {
        const victims = units.filter(u => u.player === player && getTerrainAt(u.x, u.y) === 'Kopec');
        let killed = [];
        victims.forEach(u => {
          u.hp = Math.max(0, u.hp - 1);
          if (u.hp === 0) killed.push(u);
        });
        killed.forEach(u => removeUnit(u));
        if (victims.length) setMessage(`⚡ Bouře! ${victims.length} jednotka(y) na kopci zasažena bleskem!`);
      }
      if (currentWeather.id === 'slunecno') {
        const healed = units.filter(u => u.player === player && u.hp < u.maxHp);
        healed.forEach(u => { u.hp = Math.min(u.maxHp, u.hp + 1); });
        if (healed.length) setMessage(`☀️ Sluníčko! Morálka posílena — ${healed.map(u=>u.type).join(', ')} +1 HP.`);
      }
    }

    function changeWeather() {
      const options = WEATHER_TYPES.filter(w => w.id !== currentWeather.id);
      currentWeather = options[Math.floor(Math.random() * options.length)];
      weatherTurnCounter = 0;
      showAnnounce(WEATHER_ANNOUNCES[currentWeather.id]);
      updateWeatherUI();
    }

    function showAnnounce(text, duration = 2800) {
      const el = document.getElementById('weatherAnnounce');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(showAnnounce._timer);
      showAnnounce._timer = setTimeout(() => el.classList.remove('show'), duration);
    }

    function updateWeatherUI() {
      document.getElementById('wIcon').textContent  = currentWeather.icon;
      document.getElementById('wName').textContent  = currentWeather.name;
      document.getElementById('wDesc').textContent  = currentWeather.desc;
      const remaining = WEATHER_CHANGE_INTERVAL - weatherTurnCounter;
      const suffix = remaining === 1 ? 'tah' : remaining < 5 ? 'tahy' : 'tahů';
      document.getElementById('wTimer').textContent = `Za ${remaining} ${suffix} se změní`;
    }

    // ── Fog of War helpers ──────────────────────────────────────────────────

    function hexesInRange(cx, cy, range) {
      return hexes.filter(h => hexDistance({ x: cx, y: cy }, h) <= range);
    }

    function computeVisible(player) {
      const vis = new Set();
      const unitSight = Math.max(1, 2 + weatherSightBonus());
      units.filter(u => u.player === player).forEach(u => {
        hexesInRange(u.x, u.y, unitSight).forEach(h => vis.add(`${h.x},${h.y}`));
      });
      // Castles always have sight 1 (unaffected by weather)
      castles.filter(c => c.owner === player).forEach(c => {
        hexesInRange(c.x, c.y, 1).forEach(h => vis.add(`${h.x},${h.y}`));
      });
      return vis;
    }

    function updateFog(player) {
      currentVisible = computeVisible(player);
      // Expand explored set and snapshot enemy positions for "last known state"
      currentVisible.forEach(key => {
        explored[player].add(key);
        const [x, y] = key.split(',').map(Number);
        const hex = getHex(x, y);
        const enemy = hex.unit && hex.unit.player !== player ? hex.unit : null;
        if (enemy) {
          lastKnownEnemies[player].set(key, {
            symbol: enemy.symbol, player: enemy.player,
            hp: enemy.hp, maxHp: enemy.maxHp, type: enemy.type,
            rank: enemy.rank, nickname: enemy.nickname,
          });
        } else {
          lastKnownEnemies[player].delete(key);
        }
      });
    }

    // ────────────────────────────────────────────────────────────────────────

    function neighbors(x, y) {
      const offsets = (y % 2 === 0)
        ? [{dx: -1,dy:0},{dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},{dx:0,dy:1}]
        : [{dx:-1,dy:0},{dx:-1,dy:-1},{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:1}];
      return offsets
        .map(o => ({ x: x + o.dx, y: y + o.dy }))
        .filter(p => p.x >= 0 && p.x < 9 && p.y >= 0 && p.y < 9);
    }

    function makeCastleMarker(castle) {
      const marker = document.createElement('div');
      marker.className = `castle-marker owner-${castle.owner}`;
      marker.textContent = '🏰';
      return marker;
    }

    function makeUnitEl(unit, ghost = false) {
      const el = document.createElement('div');
      let cls = `unit player${unit.player}`;
      if (ghost) cls += ' ghost';
      if (!ghost && unit.rank === 3) cls += ' rank-legend';
      el.className = cls;
      el.textContent = unit.symbol;
      if (unit.rank > 0) {
        const stars = document.createElement('div');
        stars.className = 'unit-stars';
        stars.textContent = RANK_ICONS[unit.rank];
        el.appendChild(stars);
      }
      const hp = document.createElement('span');
      hp.textContent = unit.hp;
      el.appendChild(hp);
      return el;
    }

    function renderBoard() {
      // Fog: always render from player 1's perspective when AI handles player 2
      const fogPlayer = aiEnabled ? 1 : currentPlayer;
      updateFog(fogPlayer);

      boardElement.querySelectorAll('.hex').forEach(hexEl => {
        const x = parseInt(hexEl.dataset.x, 10);
        const y = parseInt(hexEl.dataset.y, 10);
        const key = `${x},${y}`;
        const hex = getHex(x, y);
        const tile = hex.tile;

        // Clear previous state
        hexEl.classList.remove('fog-hidden', 'fog-explored');
        tile.classList.remove('highlight', 'move-target', 'attack-target', 'heal-target');
        tile.querySelectorAll('.unit, .castle-marker').forEach(el => el.remove());

        const isVisible  = currentVisible.has(key);
        const isExplored = explored[fogPlayer].has(key);

        // ── Completely dark — never seen ──────────────────────────────────
        if (!isExplored) {
          hexEl.classList.add('fog-hidden');
          return;
        }

        // ── Explored but not currently visible — greyscale + last known ──
        if (!isVisible) {
          hexEl.classList.add('fog-explored');
          const castle = getCastleAt(x, y);
          if (castle) tile.appendChild(makeCastleMarker(castle));
          const ghost = lastKnownEnemies[fogPlayer].get(key);
          if (ghost) tile.appendChild(makeUnitEl(ghost, true));
          return;
        }

        // ── Fully visible ─────────────────────────────────────────────────
        const castle = getCastleAt(x, y);
        if (castle) tile.appendChild(makeCastleMarker(castle));

        if (selectedUnit && selectedUnit.x === x && selectedUnit.y === y) tile.classList.add('highlight');
        if (validMoves.some(p => p.x === x && p.y === y))   tile.classList.add('move-target');
        if (validAttacks.some(p => p.x === x && p.y === y)) tile.classList.add('attack-target');
        if (validHeals.some(p => p.x === x && p.y === y))   tile.classList.add('heal-target');

        if (hex.unit) tile.appendChild(makeUnitEl(hex.unit));
      });
      updateStatus();
    }

    function updateStatus() {
      turnText.textContent = `Hráč ${currentPlayer} ${currentPlayer === 1 ? '(žlutý)' : '(modrý)'}`;
      const castleInfo = castles.map(c =>
        `Hrad: ${c.owner === 1 ? '🟡 H1' : '🔵 H2'}`
      ).join(' | ');
      unitStatus.innerHTML =
        `<div style="margin-bottom:8px;font-size:0.8rem;color:#b7ae9f">${castleInfo}</div>` +
        units.map(unit => {
          const filled = Math.round(unit.hp / unit.maxHp * 8);
          const bar = '█'.repeat(filled) + '░'.repeat(8 - filled);
          const rankBadge = unit.rank > 0
            ? `<span style="font-size:0.7rem">${RANK_ICONS[unit.rank]} ${RANK_NAMES[unit.rank]}</span> `
            : '';
          const displayName = unit.nickname
            ? `<span title="${unit.type}">${unit.nickname}</span>`
            : unit.type;
          const killsStr = `<span style="color:#9a9080;font-size:0.7rem"> (${unit.kills} kills)</span>`;
          return `<div style="margin-bottom:6px;">
            <strong style="color:${unit.player===1?'#d9be83':'#739cc6'}">${unit.symbol} ${displayName}</strong>${killsStr}<br>
            ${rankBadge}<span style="font-family:monospace;font-size:0.78rem">${bar} ${unit.hp}/${unit.maxHp}</span>
          </div>`;
        }).join('');
      if (!units.some(u => u.player === currentPlayer)) checkGameOver();
    }

    function setMessage(text) {
      message.textContent = text;
    }

    aiToggleBtn.addEventListener('click', () => {
      aiEnabled = !aiEnabled;
      aiToggleBtn.textContent = `AI: ${aiEnabled ? 'Zapnuto' : 'Vypnuto'}`;
    });

    restartButton.addEventListener('click', createGame);
    createGame();
  </script>
</body>
</html>
