    function placeUnits() {
      const initialPositions = [
        [{x:0,y:0},{x:2,y:0},{x:0,y:2},{x:3,y:1},{x:1,y:3}],
        [{x:8,y:8},{x:6,y:8},{x:8,y:6},{x:5,y:7},{x:7,y:5}]
      ];
      const heroPositions = [{ x: 4, y: 1 }, { x: 4, y: 7 }];
      const spyPositions  = [{ x: 1, y: 1 }, { x: 7, y: 7 }];

      for (let player = 1; player <= 2; player++) {
        // Place regular units
        initialPositions[player - 1].forEach((pos, index) => {
          const base = baseUnits[index];
          const unit = {
            id: `${player}-${index}`,
            player,
            x: pos.x,
            y: pos.y,
            type: base.type,
            move: base.move,
            attack: base.attack,
            range: base.range,
            hp: base.hp,
            maxHp: base.hp,
            symbol: base.symbol,
            moved: false,
            attacked: false,
            kills: 0,
            rank: 0,
            nickname: null,
            abilityUsed: false,
            shieldWall: false,
            precisionShot: false,
            resurrectionUsed: false,
          };
          units.push(unit);
          getHex(pos.x, pos.y).unit = unit;
        });

        // Place hero
        const hp = HERO_BASE.hp;
        const hPos = heroPositions[player - 1];
        const hero = {
          id: `${player}-hero`,
          player,
          x: hPos.x,
          y: hPos.y,
          type: HERO_BASE.type,
          isHero: true,
          move: HERO_BASE.move,
          attack: HERO_BASE.attack,
          range: HERO_BASE.range,
          hp,
          maxHp: hp,
          symbol: HERO_BASE.symbol,
          moved: false,
          attacked: false,
          kills: 0,
          rank: 0,
          nickname: null,
          abilityUsed: false,
          shieldWall: false,
          precisionShot: false,
          resurrectionUsed: false,
          xp: 0,
          heroLevel: 1,
          indomitableUsed: false,
          wasAttackedThisTurn: false,
          battleCryBonus: 0,
        };
        units.push(hero);
        getHex(hPos.x, hPos.y).unit = hero;

        // Place spy
        const spyBase = baseUnits.find(b => b.type === 'Špión');
        const sPos = spyPositions[player - 1];
        const spy = {
          id: `${player}-spy`,
          player,
          x: sPos.x,
          y: sPos.y,
          type: spyBase.type,
          isSpy: true,
          move: spyBase.move,
          attack: spyBase.attack,
          range: spyBase.range,
          hp: spyBase.hp,
          maxHp: spyBase.hp,
          symbol: spyBase.symbol,
          moved: false,
          attacked: false,
          kills: 0,
          rank: 0,
          nickname: null,
          abilityUsed: false,
          shieldWall: false,
          precisionShot: false,
          resurrectionUsed: false,
          sabotageCount: 0,
        };
        units.push(spy);
        getHex(sPos.x, sPos.y).unit = spy;
      }
    }

    function getHex(x, y)  { return hexes.find(cell => cell.x === x && cell.y === y); }
    function hasPoint(list, x, y) { return list.some(p => p.x === x && p.y === y); }

    // Spy stealth: spy is visible to `observingPlayer` only if they have a unit adjacent (dist ≤ 1)
    function isSpyVisibleTo(spy, observingPlayer) {
      return units.some(u => u.player === observingPlayer && hexDistance(u, spy) <= 1);
    }
    // Returns true if a unit should be rendered / known to `observingPlayer`
    function isUnitVisibleTo(unit, observingPlayer) {
      if (!unit.isSpy) return true;
      if (unit.player === observingPlayer) return true;
      return isSpyVisibleTo(unit, observingPlayer);
    }
    function isBridge(x, y) { return hasPoint(BRIDGES, x, y); }
    function isFord(x, y) { return hasPoint(FORDS, x, y); }
    function isRiver(x, y) { return hasPoint(RIVER_PATH, x, y) && !isBridge(x, y) && !isFord(x, y); }
    function getTerrainAt(x, y) {
      if (isBridge(x, y)) return 'Most';
      if (isFord(x, y)) return 'Přebrod';
      if (isRiver(x, y)) return 'Řeka';
      return terrainTypes[mapTemplate[y][x]];
    }
    function getCastleAt(x, y)  { return castles.find(c => c.x === x && c.y === y) || null; }

    function selectHex(x, y) {
      if (aiThinking || turnTransition) return;
      if (checkGameOver()) return;
      const hex  = getHex(x, y);
      const unit = hex.unit;

      if (abilityMode === 'charge-move') {
        if (validMoves.some(p => p.x === x && p.y === y) && !hex.unit) chargeMove(abilityUnit, x, y);
        return;
      }
      if (abilityMode === 'charge-attack') {
        if (unit && unit.player !== currentPlayer && validAttacks.some(p => p.x === x && p.y === y)) {
          abilityMode = null;
          performAttack(abilityUnit, unit);
          abilityUnit = null;
        }
        return;
      }
      if (abilityMode === 'bombard') {
        if (validAttacks.some(p => p.x === x && p.y === y)) performBombardment(abilityUnit, x, y);
        return;
      }

      if (selectedUnit?.precisionShot && unit && unit.player !== currentPlayer) {
        if (validAttacks.some(p => p.x === x && p.y === y)) {
          performAttack(selectedUnit, unit, true);
          return;
        }
      }

      if (selectedUnit && selectedUnit.type === 'Kněz' && unit && unit.player === currentPlayer && unit.id !== selectedUnit.id) {
        if (validHeals.some(h => h.x === x && h.y === y)) {
          healUnit(selectedUnit, unit);
          return;
        }
      }

      if (selectedUnit && unit && unit.player !== currentPlayer && canAttack(selectedUnit, unit)) {
        performAttack(selectedUnit, unit);
        return;
      }

      if (unit && unit.player === currentPlayer) {
        selectUnit(unit);
        return;
      }

      if (selectedUnit && canMoveTo(selectedUnit, x, y)) {
        moveUnit(selectedUnit, x, y);
        return;
      }

      setMessage('Vyber svou jednotku nebo cílové políčko pro přesun.');
    }

    function selectUnit(unit) {
      abilityMode = null;
      abilityUnit = null;
      selectedUnit = unit;
      validMoves   = calculateMoveTargets(unit);
      validAttacks = calculateAttackTargets(unit);
      validHeals   = calculateHealTargets(unit);
      const displayName = unit.nickname || unit.type;
      const extra = unit.type === 'Kněz' ? ' Může léčit spojence.'
        : unit.isHero ? ` ♛ Hrdina Lv.${unit.heroLevel} (${unit.xp} XP).` : '';
      setMessage(`Vybrán ${displayName}. Pohyb: ${unit.move}, Útok: ${unit.attack}, Dosah: ${unit.range}.${extra}`);
      renderBoard();
    }

    function canMoveTo(unit, x, y) {
      return validMoves.some(pos => pos.x === x && pos.y === y);
    }
    function canAttack(attacker, target) {
      return validAttacks.some(pos => pos.x === target.x && pos.y === target.y) && target.player !== attacker.player;
    }

    function flashTile(x, y) {
      const hex = getHex(x, y);
      if (!hex) return;
      hex.tile.classList.remove('flash-hit', 'tile-shake');
      void hex.tile.offsetWidth;
      hex.tile.classList.add('flash-hit', 'tile-shake');
      setTimeout(() => hex.tile.classList.remove('flash-hit', 'tile-shake'), 500);
    }

    function performAttack(attacker, defender, ignoreTerrain = false) {
      setMusicMood('dramatic');
      const baseAtk    = attacker.attack + (attacker.type === 'Rytíř' ? 1 : 0);
      const atkBonus   = getTerrainAt(attacker.x, attacker.y) === 'Kopec' ? 1 : 0;
      const defBonus   = ignoreTerrain ? 0 : (getTerrainAt(defender.x, defender.y) === 'Les' ? 1 : 0);
      const castleBonus= ignoreTerrain ? 0 : (getCastleAt(defender.x, defender.y) ? 2 : 0);
      const shieldBonus= defender.shieldWall ? 2 : 0;
      const bridgePenalty = getTerrainAt(defender.x, defender.y) === 'Most' ? 1 : 0;
      const cryBonus   = attacker.battleCryBonus || 0;
      const damage     = Math.max(0, baseAtk + atkBonus - defBonus - castleBonus - shieldBonus + bridgePenalty + cryBonus);

      flashTile(defender.x, defender.y);
      defender.hp = Math.max(0, defender.hp - damage);
      attacker.attacked = true;
      if (attacker.precisionShot) attacker.precisionShot = false;

      // Hero: track if attacked and survived (for survival XP)
      if (defender.isHero && defender.hp > 0) {
        defender.wasAttackedThisTurn = true;
      }

      // Nezlomnost (Indomitable): hero survives fatal hit with 1 HP, once per game
      if (defender.isHero && defender.hp <= 0 && defender.heroLevel >= 3 && !defender.indomitableUsed) {
        defender.hp = 1;
        defender.indomitableUsed = true;
        showAnnounce(`🛡️ Nezlomnost! ${defender.nickname || 'Hrdina'} přežívá s 1 HP!`, 2800);
      }

      // If attacker struck from outside fog-player's visibility, reveal their position for 2 turns
      const fogP = aiEnabled ? 1 : currentPlayer;
      if (attacker.player !== fogP) {
        const atkKey = `${attacker.x},${attacker.y}`;
        if (!currentVisible.has(atkKey)) {
          attackReveal.set(atkKey, 2);
        }
      }

      const bonusInfo = [];
      if (atkBonus)      bonusInfo.push(`+${atkBonus} kopec`);
      if (defBonus)      bonusInfo.push(`−${defBonus} les`);
      if (castleBonus)   bonusInfo.push(`−${castleBonus} hrad`);
      if (shieldBonus)   bonusInfo.push(`−${shieldBonus} štít`);
      if (bridgePenalty) bonusInfo.push(`+${bridgePenalty} most`);
      if (cryBonus)      bonusInfo.push(`+${cryBonus} pokřik`);
      if (ignoreTerrain) bonusInfo.push('🎯 přesná');
      const info = bonusInfo.length ? ` (${bonusInfo.join(', ')})` : '';
      const aName = attacker.nickname || attacker.type;
      const dName = defender.nickname || defender.type;
      setMessage(`⚔️ ${aName} útočil na ${dName} — ${damage} poškození${info}. ${dName} má ${defender.hp}/${defender.maxHp} HP.`);

      if (defender.hp <= 0) {
        attacker.kills += 1;
        checkPromotion(attacker);
        // Hero XP for kill
        if (attacker.isHero) {
          attacker.xp += 10;
          checkHeroLevelUp(attacker);
        }
        // Record kill for statistics
        killLog.push({
          killerType: attacker.type, killerPlayer: attacker.player,
          killerNickname: attacker.nickname || null,
          victimType: defender.type,  victimPlayer: defender.player,
          victimNickname: defender.nickname || null,
        });
        setTimeout(() => {
          const dN = defender.nickname || defender.type;
          removeUnit(defender);
          setMessage(`💀 ${attacker.nickname || attacker.type} poráží ${dN}! (eliminován)`);
          renderBoard();
        }, 300);
      }
      endTurn();
    }

    function healUnit(healer, target) {
      target.hp = Math.min(target.maxHp, target.hp + 3);
      healer.attacked = true;
      setMessage(`Kněz léčí ${target.type} o 3 HP (${target.hp}/${target.maxHp}).`);
      endTurn();
    }

    function checkPromotion(unit) {
      for (let r = 3; r >= 1; r--) {
        if (unit.kills >= RANK_KILLS[r] && unit.rank < r) {
          promoteUnit(unit, r);
          return;
        }
      }
    }

    function promoteUnit(unit, newRank) {
      unit.rank = newRank;
      unit.attack += 1;
      if (newRank === 2) {
        unit.maxHp += 1;
        unit.hp = Math.min(unit.hp + 1, unit.maxHp);
      }
      if (newRank === 3) {
        const pool = NICKNAMES[unit.type] || ['Legendární bojovník'];
        unit.nickname = pool[Math.floor(Math.random() * pool.length)];
      }
      const displayName = unit.nickname || unit.type;
      showAnnounce(`${displayName} povýšen na ${RANK_NAMES[newRank]}! ${RANK_ICONS[newRank]}`, 3200);
    }

    function moveUnit(unit, x, y) {
      setMusicMood('calm');
      const start = getHex(unit.x, unit.y);
      const dest  = getHex(x, y);
      if (dest.unit) return;
      const fromEl = start.tile.querySelector('.unit');
      if (fromEl) pendingMoveAnim = { unitId: unit.id, fromRect: fromEl.getBoundingClientRect() };
      // Spy leaving a castle resets sabotage counter
      if (unit.isSpy) {
        const prevCastle = getCastleAt(unit.x, unit.y);
        if (!prevCastle || prevCastle.owner === unit.player || (prevCastle.x !== x || prevCastle.y !== y)) {
          unit.sabotageCount = 0;
        }
      }
      start.unit = null;
      dest.unit  = unit;
      unit.x = x;
      unit.y = y;
      unit.moved = true;
      const castle = getCastleAt(x, y);
      if (castle && castle.owner !== unit.player) {
        castle.owner = unit.player;
        setMessage(`${unit.type} dobývá hrad! Patří nyní Hráči ${unit.player}.`);
      } else {
        setMessage(`${unit.type} se přemístil.`);
      }
      endTurn();
    }

    function removeUnit(unit) {
      if (!unit.isHero) {
        lastKilledFriendly[unit.player] = {
          id: unit.id, player: unit.player, type: unit.type,
          move: unit.move, attack: unit.attack, range: unit.range,
          maxHp: unit.maxHp, symbol: unit.symbol,
          kills: unit.kills, rank: unit.rank, nickname: unit.nickname,
          abilityUsed: false, shieldWall: false, precisionShot: false, resurrectionUsed: false,
        };
      }
      const hex = getHex(unit.x, unit.y);
      if (hex) hex.unit = null;
      units = units.filter(item => item.id !== unit.id);
      if (selectedUnit?.id === unit.id) selectedUnit = null;
      if (unit.isHero) {
        const winner = unit.player === 1 ? 2 : 1;
        setTimeout(() => declareWinner(winner, true), 350);
      }
    }

    function getHero(player) {
      return units.find(u => u.player === player && u.isHero) || null;
    }

    function checkHeroLevelUp(hero) {
      if (hero.heroLevel === 1 && hero.xp >= HERO_XP_L2) {
        hero.heroLevel = 2;
        hero.maxHp  += 2;
        hero.hp      = Math.min(hero.hp + 2, hero.maxHp);
        hero.attack += 1;
        showAnnounce(`♛ Hrdina dosáhl Levelu 2! 📣 Bojový pokřik odemčen!`, 3500);
        renderBoard();
      } else if (hero.heroLevel >= 2 && hero.xp >= HERO_XP_L3) {
        hero.heroLevel = 3;
        hero.maxHp  += 2;
        hero.hp      = Math.min(hero.hp + 2, hero.maxHp);
        hero.move   += 1;
        showAnnounce(`♛ Hrdina dosáhl Levelu 3! 🛡️ Nezlomnost odemčena!`, 3500);
        renderBoard();
      }
    }

    function activateBattleCry(hero) {
      if (!hero || hero.heroLevel < 2 || hero.abilityUsed) {
        setMessage('📣 Bojový pokřik není dostupný (vyžaduje Level 2, 1× za tah).');
        return;
      }
      hero.abilityUsed = true;
      hero.battleCryBonus = (hero.battleCryBonus || 0) + 1;
      const allies = units.filter(u => u.player === hero.player && u.id !== hero.id);
      const inRange = allies.filter(a => hexDistance(a, hero) <= 2);
      inRange.forEach(a => { a.battleCryBonus = (a.battleCryBonus || 0) + 1; });
      setMessage(`📣 Bojový pokřik! Hrdina + ${inRange.length} spojenec(ů) získává +1 útok.`);
      renderBoard();
    }

    function endTurn() {
      stopTurnTimer();
      validMoves   = [];
      validAttacks = [];
      validHeals   = [];
      selectedUnit = null;
      hideTooltip();

      const leavingPlayer = currentPlayer;
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      abilityMode  = null;
      abilityUnit  = null;

      // Countdown attack-reveal timers each turn
      attackReveal.forEach((turns, key) => {
        if (turns <= 1) attackReveal.delete(key);
        else attackReveal.set(key, turns - 1);
      });
      // Hero survival XP: if hero was attacked this turn and survived, +2 XP
      const leavingHero = getHero(leavingPlayer);
      if (leavingHero && leavingHero.wasAttackedThisTurn) {
        leavingHero.xp += 2;
        leavingHero.wasAttackedThisTurn = false;
        checkHeroLevelUp(leavingHero);
      }

      // Spy sabotage: increment counter if standing on enemy castle; capture after 2 turns
      units.filter(u => u.player === leavingPlayer && u.isSpy).forEach(spy => {
        const c = getCastleAt(spy.x, spy.y);
        if (c && c.owner !== spy.player) {
          spy.sabotageCount = (spy.sabotageCount || 0) + 1;
          if (spy.sabotageCount >= 2) {
            c.owner = spy.player;
            spy.sabotageCount = 0;
            showAnnounce(`🗡️ Sabotáž! ${spy.nickname || 'Špión'} ovládl hrad pro Hráče ${spy.player}!`, 3000);
          } else {
            setMessage(`🗡️ Špiónská sabotáž probíhá… (${spy.sabotageCount}/2 tahů)`);
          }
        } else if (!c || c.owner === spy.player) {
          spy.sabotageCount = 0;
        }
      });

      units.forEach(unit => {
        if (unit.player === currentPlayer) {
          unit.moved           = false;
          unit.attacked        = false;
          unit.abilityUsed     = false;
          unit.shieldWall      = false;
          unit.precisionShot   = false;
          unit.battleCryBonus  = 0;
          if (unit.isHero) unit.wasAttackedThisTurn = false;
        }
      });

      if (currentPlayer === 1) {
        totalTurns++;
        weatherTurnCounter++;
        if (weatherTurnCounter >= WEATHER_CHANGE_INTERVAL) {
          changeWeather();
        } else {
          updateWeatherUI();
        }
      }

      applyWeatherStartOfTurn(currentPlayer);

      updateStatus();
      renderBoard();
      if (checkGameOver()) return;

      // After player 1's turn: 1s pause with "Tah končí…" banner
      if (leavingPlayer === 1) {
        if (currentPlayer === 2 && aiEnabled) aiThinking = true;
        turnTransition = true;
        showTurnEndBanner(() => {
          turnTransition = false;
          if (currentPlayer === 2 && aiEnabled) {
            setMessage('AI přemýšlí…');
            scheduleAiTurn(450);
          } else {
            startTurnTimer();
          }
        });
      } else {
        if (currentPlayer === 2 && aiEnabled) {
          aiThinking = true;
          setMessage('AI přemýšlí…');
          scheduleAiTurn(750);
        } else {
          startTurnTimer();
        }
      }
    }

    function aiTurn() {
      stopTurnTimer();
      aiThinking = false;
      if (checkGameOver()) return;

      if (aiDifficulty === 'easy') { aiTurnEasy(); return; }
      if (aiDifficulty === 'hard') { aiTurnHard(); return; }
      aiTurnMedium();
    }

    function pickNearestEnemy(attacker, targets) {
      if (!targets.length) return null;
      return targets.reduce((best, enemy) =>
        hexDistance(attacker, enemy) < hexDistance(attacker, best) ? enemy : best, targets[0]);
    }

    function moveUnitTowardTarget(unit, target, preferSafe = false) {
      const moves = calculateMoveTargets(unit);
      if (!moves.length) return false;
      let candidates = moves;
      if (preferSafe) {
        const safer = moves.filter(m => {
          const terr = getTerrainAt(m.x, m.y);
          const dangerTile = currentWeather.id === 'boure' && terr === 'Kopec';
          return !dangerTile;
        });
        if (safer.length) candidates = safer;
      }
      let best = candidates[0];
      let bestDist = hexDistance(candidates[0], target);
      candidates.forEach(mv => {
        const d = hexDistance(mv, target);
        if (d < bestDist) { bestDist = d; best = mv; }
      });
      const currentDist = hexDistance(unit, target);
      if (bestDist >= currentDist && CROSSINGS.length) {
        const nearestCrossing = CROSSINGS.reduce((bestCross, c) =>
          hexDistance(unit, c) < hexDistance(unit, bestCross) ? c : bestCross, CROSSINGS[0]);
        best = candidates.reduce((bestMv, mv) =>
          hexDistance(mv, nearestCrossing) < hexDistance(bestMv, nearestCrossing) ? mv : bestMv, candidates[0]);
      }
      moveUnit(unit, best.x, best.y);
      return true;
    }

    function aiTurnEasy() {
      const aiUnits = units.filter(u => u.player === 2);
      const enemies = units.filter(u => u.player === 1);
      for (const unit of aiUnits) {
        const attacks = calculateAttackTargets(unit);
        if (attacks.length) {
          const inRange = enemies.filter(e => attacks.some(a => a.x === e.x && a.y === e.y));
          const nearest = pickNearestEnemy(unit, inRange);
          if (nearest) {
            performAttack(unit, nearest, true);
            return;
          }
        }
      }
      const movable = aiUnits.filter(u => calculateMoveTargets(u).length > 0);
      if (!movable.length) { endTurn(); return; }
      const unit = movable[Math.floor(Math.random() * movable.length)];
      const moves = calculateMoveTargets(unit);
      const randMove = moves[Math.floor(Math.random() * moves.length)];
      moveUnit(unit, randMove.x, randMove.y);
    }

    function aiTurnMedium() {
      const aiUnits = units.filter(u => u.player === 2);
      const enemies = units.filter(u => u.player === 1);
      if (aiUseAbilities(aiUnits)) return;

      for (const unit of aiUnits) {
        if (unit.type !== 'Kněz') continue;
        const heals = calculateHealTargets(unit);
        if (heals.length) {
          const targets = units.filter(u => heals.some(h => h.x === u.x && h.y === u.y));
          targets.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
          healUnit(unit, targets[0]);
          return;
        }
      }

      for (const unit of aiUnits) {
        const attacks = calculateAttackTargets(unit);
        if (!attacks.length) continue;
        const targets = enemies.filter(e => attacks.some(a => a.x === e.x && a.y === e.y));
        // Prefer attacking hero when available, otherwise weakest
        targets.sort((a, b) => (b.isHero ? 1 : 0) - (a.isHero ? 1 : 0) || (a.hp - b.hp));
        performAttack(unit, targets[0]);
        return;
      }

      // Medium: defend own castle if enemy is near it.
      const ownCastles = castles.filter(c => c.owner === 2);
      for (const castle of ownCastles) {
        const threat = enemies.find(e => hexDistance(e, castle) <= 2);
        if (!threat) continue;
        for (const unit of aiUnits) {
          if (unit.type === 'Kněz') continue;
          if (moveUnitTowardTarget(unit, castle, true)) return;
        }
      }

      const enemyCastles = castles.filter(c => c.owner !== 2);
      if (enemyCastles.length) {
        for (const unit of aiUnits) {
          if (unit.type === 'Kněz') continue;
          const target = enemyCastles.reduce((best, c) =>
            hexDistance(unit, c) < hexDistance(unit, best) ? c : best, enemyCastles[0]);
          if (moveUnitTowardTarget(unit, target, true)) return;
        }
      }

      if (!enemies.length) { endTurn(); return; }
      for (const unit of aiUnits) {
        if (unit.type === 'Katapult' || unit.type === 'Kněz') continue;
        const nearestEnemy = pickNearestEnemy(unit, enemies);
        if (nearestEnemy && moveUnitTowardTarget(unit, nearestEnemy, true)) return;
      }
      endTurn();
    }

    function aiTurnHard() {
      const aiUnits = units.filter(u => u.player === 2);
      const enemies = units.filter(u => u.player === 1);
      if (aiUseAbilities(aiUnits)) return;

      const ownHero   = getHero(2);
      const enemyHero = getHero(1);

      // Hard: protect own hero — if hero can be attacked by enemy next turn, retreat it first.
      if (ownHero && !ownHero.attacked) {
        const heroAtRisk = enemies.some(e => {
          const eAtks = calculateAttackTargets(e);
          return eAtks.some(a => a.x === ownHero.x && a.y === ownHero.y);
        });
        if (heroAtRisk && ownHero.hp < ownHero.maxHp * 0.5) {
          // Retreat hero away from danger
          const safeMove = calculateMoveTargets(ownHero).filter(pos => {
            return !enemies.some(e => {
              const ea = calculateAttackTargets(e);
              return ea.some(a => a.x === pos.x && a.y === pos.y);
            });
          });
          if (safeMove.length) {
            safeMove.sort((a, b) =>
              (enemies.reduce((s, e) => s + hexDistance(e, b), 0) -
               enemies.reduce((s, e) => s + hexDistance(e, a), 0))
            );
            const dest = safeMove[0];
            const fromHex = getHex(ownHero.x, ownHero.y);
            const toHex   = getHex(dest.x, dest.y);
            if (toHex && !toHex.unit) {
              fromHex.unit = null;
              toHex.unit = ownHero;
              ownHero.x = dest.x; ownHero.y = dest.y;
              ownHero.moved = true;
              endTurn(); return;
            }
          }
        }
      }

      // Hard: actively target the enemy hero when in range.
      if (enemyHero) {
        for (const unit of aiUnits) {
          const attacks = calculateAttackTargets(unit);
          if (attacks.some(a => a.x === enemyHero.x && a.y === enemyHero.y)) {
            performAttack(unit, enemyHero);
            return;
          }
        }
        // Move toward enemy hero if hero is low HP
        if (enemyHero.hp < enemyHero.maxHp * 0.5) {
          const attackers = aiUnits.filter(u => u.type !== 'Kněz' && !u.moved);
          for (const unit of attackers) {
            if (moveUnitTowardTarget(unit, enemyHero, true)) return;
          }
        }
      }

      // Hard: protect veteran units and avoid terrain disadvantages.
      for (const unit of aiUnits.filter(u => u.rank >= 2)) {
        const attacks = calculateAttackTargets(unit);
        if (!attacks.length) continue;
        const targets = enemies.filter(e => attacks.some(a => a.x === e.x && a.y === e.y));
        const safeTargets = targets.filter(t => {
          const terr = getTerrainAt(t.x, t.y);
          return terr !== 'Les' && !getCastleAt(t.x, t.y);
        });
        const pool = safeTargets.length ? safeTargets : targets;
        // Prioritize hero targets
        pool.sort((a, b) => (b.isHero ? 1 : 0) - (a.isHero ? 1 : 0) || (a.hp - b.hp));
        performAttack(unit, pool[0]);
        return;
      }

      // Hard: focus on multi-target opportunities and high-value targets.
      for (const unit of aiUnits) {
        const attacks = calculateAttackTargets(unit);
        if (!attacks.length) continue;
        const targets = enemies.filter(e => attacks.some(a => a.x === e.x && a.y === e.y));
        // Hero gets highest attack priority
        targets.sort((a, b) => (b.isHero ? 2 : 0) - (a.isHero ? 2 : 0) || (b.rank - a.rank) || (a.hp - b.hp));
        performAttack(unit, targets[0]);
        return;
      }

      // Hard: guard bridges when enemies approach crossings.
      const threatenedBridge = BRIDGES.find(bridge =>
        enemies.some(e => hexDistance(e, bridge) <= 2)
      );
      if (threatenedBridge) {
        const guards = aiUnits
          .filter(u => u.type !== 'Kněz')
          .sort((a, b) =>
            hexDistance(a, threatenedBridge) - hexDistance(b, threatenedBridge) ||
            b.rank - a.rank || b.hp - a.hp
          );
        for (const guard of guards) {
          if (guard.x === threatenedBridge.x && guard.y === threatenedBridge.y) break;
          if (moveUnitTowardTarget(guard, threatenedBridge, true)) return;
        }
      }

      // Hard: spy infiltration — send spy toward enemy castle via a flanking route
      const aiSpy = aiUnits.find(u => u.isSpy && !u.moved);
      if (aiSpy) {
        const enemyCastleTargets = castles.filter(c => c.owner !== 2);
        if (enemyCastleTargets.length) {
          const spyTarget = enemyCastleTargets.reduce((best, c) =>
            hexDistance(aiSpy, c) < hexDistance(aiSpy, best) ? c : best, enemyCastleTargets[0]);
          // If already on an enemy castle, stay (sabotage is auto — spy should NOT move)
          if (aiSpy.x === spyTarget.x && aiSpy.y === spyTarget.y) {
            // Spy stays put to build sabotage count
          } else if (moveUnitTowardTarget(aiSpy, spyTarget, false)) {
            return;
          }
        }
      }

      const enemyCastles = castles.filter(c => c.owner !== 2);
      if (enemyCastles.length) {
        // Hard: prioritize castle capture with non-priest, non-spy units first.
        const attackers = aiUnits
          .filter(u => u.type !== 'Kněz' && !u.isSpy)
          .sort((a, b) => b.rank - a.rank || b.hp - a.hp);
        for (const unit of attackers) {
          const target = enemyCastles.reduce((best, c) =>
            hexDistance(unit, c) < hexDistance(unit, best) ? c : best, enemyCastles[0]);
          if (moveUnitTowardTarget(unit, target, true)) return;
        }
      }

      // Hard: fallback pressure on nearest enemy while preferring safer tiles.
      if (!enemies.length) { endTurn(); return; }
      const ordered = aiUnits.slice().sort((a, b) => b.rank - a.rank || b.hp - a.hp);
      for (const unit of ordered) {
        if (unit.type === 'Kněz' || unit.isSpy) continue;
        const nearestEnemy = pickNearestEnemy(unit, enemies);
        if (nearestEnemy && moveUnitTowardTarget(unit, nearestEnemy, true)) return;
      }
      // Spy fallback: if no other unit moved, let spy also apply pressure
      if (aiSpy && !aiSpy.moved) {
        const nearestE = pickNearestEnemy(aiSpy, enemies);
        if (nearestE && moveUnitTowardTarget(aiSpy, nearestE, false)) return;
      }
      endTurn();
    }

    function checkGameOver() {
      const p1 = units.filter(u => u.player === 1).length;
      const p2 = units.filter(u => u.player === 2).length;
      if (p1 === 0) { declareWinner(2); return true; }
      if (p2 === 0) { declareWinner(1); return true; }
      const p1Castles = castles.filter(c => c.owner === 1).length;
      const p2Castles = castles.filter(c => c.owner === 2).length;
      if (p1Castles === castles.length) { declareWinner(1); return true; }
      if (p2Castles === castles.length) { declareWinner(2); return true; }
      return false;
    }

    function declareWinner(winner, heroKilled = false) {
      setMusicMood('victory');
      stopTurnTimer();
      clearAiSchedule();
      cancelTurnEndBanner();
      const reason = heroKilled ? ' (Hrdina padl!)' : '';
      turnText.textContent = `Hráč ${winner} vyhrává!${reason}`;
      setMessage(`Konec hry${reason} Vítěz: Hráč ${winner}.`);
      setTimeout(() => showStatsScreen(winner, heroKilled), 1400);
    }

    function showStatsScreen(winner, heroKilled = false) {
      const elapsed   = Math.round((Date.now() - gameStartTime) / 1000);
      const minutes   = Math.floor(elapsed / 60);
      const seconds   = elapsed % 60;
      const timeStr   = minutes > 0 ? `${minutes} min ${seconds} s` : `${seconds} s`;
      const p1Color   = '#d9be83';
      const p2Color   = '#739cc6';
      const pColor    = (p) => p === 1 ? p1Color : p2Color;
      const pName     = (p) => `Hráč ${p} (${p === 1 ? 'žlutý' : 'modrý'})`;

      // ── Winner banner ──
      const winnerColor = winner === 1 ? '#f0d060' : '#80aade';
      document.getElementById('statsWinnerBanner').innerHTML =
        `<span style="color:${winnerColor}">⚔️ ${pName(winner)} vítězí!${heroKilled ? ' <span style="font-size:0.65em;color:#e88">Hrdina padl!</span>' : ''}</span>`;

      // ── Meta ──
      document.getElementById('statsMeta').textContent =
        `Celkem tahů: ${totalTurns} · Délka hry: ${timeStr}`;

      // ── MVP ── (survivor with most kills)
      const mvp = units.filter(u => u.kills > 0).sort((a, b) => b.kills - a.kills)[0] || null;
      let mvpHtml = '<div style="color:#9a9080;font-size:0.78rem">— žádné eliminations —</div>';
      if (mvp && mvp.kills > 0) {
        const pct = Math.round(mvp.hp / mvp.maxHp * 100);
        mvpHtml = `<div class="stats-mvp-card">
          <div class="stats-mvp-name">${mvp.nickname || mvp.type}</div>
          <div style="color:${pColor(mvp.player)};font-size:0.78rem;margin-top:2px">${pName(mvp.player)}</div>
          <div style="font-size:0.8rem;margin-top:6px">
            💀 ${mvp.kills} ${mvp.kills === 1 ? 'kill' : 'killů'} &nbsp;·&nbsp; ${RANK_ICONS[mvp.rank] || 'Rekrut'}
          </div>
          <div style="font-size:0.75rem;color:#9a9080;margin-top:4px">HP: ${mvp.hp}/${mvp.maxHp} (${pct}%)</div>
        </div>`;
      }
      document.getElementById('statsMvp').innerHTML = mvpHtml;

      // ── Heroes ──
      let heroesHtml = '';
      for (const p of [1, 2]) {
        const hero = units.find(u => u.player === p && u.isHero);
        if (hero) {
          const lvl = hero.heroLevel;
          heroesHtml += `<div class="stats-hero-row">
            <span style="color:${pColor(p)}">♛</span>
            <span style="color:${pColor(p)};font-weight:600">${pName(p)}</span>
            <span style="color:#9a9080;font-size:0.72rem">Lv.${lvl} · ${hero.xp} XP · ${hero.hp}/${hero.maxHp} HP</span>
          </div>`;
        } else {
          heroesHtml += `<div class="stats-hero-row" style="color:#9a9080">♛ ${pName(p)}: <em>padl</em></div>`;
        }
      }
      document.getElementById('statsHeroes').innerHTML = heroesHtml || '<div style="color:#9a9080;font-size:0.78rem">—</div>';

      // ── Survivors ──
      let survHtml = '';
      for (const p of [1, 2]) {
        const pUnits = units.filter(u => u.player === p);
        survHtml += `<div style="color:${pColor(p)};font-weight:600;font-size:0.75rem;margin:5px 0 3px">${pName(p)} (${pUnits.length})</div>`;
        if (pUnits.length === 0) {
          survHtml += `<div style="color:#9a9080;font-size:0.75rem;margin-bottom:6px">— všichni padli —</div>`;
        } else {
          pUnits.forEach(u => {
            const pct = Math.round(u.hp / u.maxHp * 100);
            const fill = `<div class="hp-bar-sm-fill p${p}" style="width:${pct}%"></div>`;
            survHtml += `<div class="stats-survivor-row">
              <span style="color:${pColor(p)}">${u.symbol}</span>
              <span>${u.nickname || u.type}</span>
              <div class="hp-bar-sm">
                <div class="hp-bar-sm-bg">${fill}</div>
                <span style="font-size:0.68rem;color:#9a9080">${u.hp}/${u.maxHp}</span>
              </div>
              ${u.kills > 0 ? `<span style="font-size:0.7rem;color:#c8a858">💀${u.kills}</span>` : ''}
            </div>`;
          });
        }
      }
      document.getElementById('statsSurvivors').innerHTML = survHtml;

      // ── Kill log ──
      let killHtml = '';
      if (killLog.length === 0) {
        killHtml = '<div style="color:#9a9080;font-size:0.75rem">— žádné souboje —</div>';
      } else {
        killLog.forEach(k => {
          const kName = k.killerNickname || k.killerType;
          const vName = k.victimNickname || k.victimType;
          killHtml += `<div class="stats-kill-row">
            <span class="killer" style="color:${pColor(k.killerPlayer)}">${kName} (H${k.killerPlayer})</span>
            <span style="color:#6a6058"> zabil </span>
            <span class="victim" style="color:${pColor(k.victimPlayer)}">${vName} (H${k.victimPlayer})</span>
          </div>`;
        });
      }
      document.getElementById('statsKillLog').innerHTML = killHtml;

      // ── Show overlay ──
      const screen = document.getElementById('statsScreen');
      screen.classList.remove('hidden');
      requestAnimationFrame(() => requestAnimationFrame(() => screen.classList.add('visible')));
    }

    function calculateMoveTargets(unit, customMove = null) {
      const effectiveMove = customMove !== null ? customMove : Math.max(1, unit.move + weatherMoveBonus());
      const bestCost = new Map();
      const targets = [];
      const queue   = [{ x: unit.x, y: unit.y, cost: 0 }];
      while (queue.length) {
        const current = queue.shift();
        const key = `${current.x},${current.y}`;
        const known = bestCost.get(key);
        if (known !== undefined && current.cost >= known) continue;
        if (current.cost > effectiveMove) continue;
        bestCost.set(key, current.cost);
        if (!(current.x === unit.x && current.y === unit.y) && !getHex(current.x, current.y).unit) {
          targets.push({ x: current.x, y: current.y });
        }
        neighbors(current.x, current.y).forEach(nb => {
          if (getHex(nb.x, nb.y).unit && !(nb.x === unit.x && nb.y === unit.y)) return;
          if (isRiver(nb.x, nb.y)) return;
          let stepCost = 1;
          if (isBridge(nb.x, nb.y)) stepCost = 2;
          if (isFord(nb.x, nb.y)) stepCost = Math.max(1, effectiveMove - current.cost);
          const nextCost = current.cost + stepCost;
          if (nextCost <= effectiveMove) queue.push({ x: nb.x, y: nb.y, cost: nextCost });
        });
      }
      return targets;
    }

    function calculateAttackTargets(unit) {
      if (unit.attack === 0) return [];
      if (currentWeather.id === 'dest' && unit.type === 'Katapult') return [];
      const effectiveRange = weatherEffectiveRange(unit);
      const targets = [];
      units.forEach(enemy => {
        if (enemy.player === unit.player) return;
        // Enemy spy: only attackable if visible (adjacent friendly)
        if (!isUnitVisibleTo(enemy, unit.player)) return;
        const dist = hexDistance(unit, enemy);
        if (dist <= effectiveRange) targets.push({ x: enemy.x, y: enemy.y });
      });
      return targets;
    }

    function calculateHealTargets(unit) {
      if (unit.type !== 'Kněz') return [];
      const targets = [];
      units.forEach(ally => {
        if (ally.player !== unit.player || ally.id === unit.id) return;
        const dist = hexDistance(unit, ally);
        if (dist <= unit.range && ally.hp < ally.maxHp) targets.push({ x: ally.x, y: ally.y });
      });
      return targets;
    }

    // ── Special abilities ────────────────────────────────────────────────────
    function activateAbility(unit) {
      if (!unit || unit.abilityUsed) return;
      switch (unit.type) {
        case 'Rytíř':     activateCharge(unit);        break;
        case 'Lučištník': activatePrecisionShot(unit); break;
        case 'Pěšák':     activateShieldWall(unit);    break;
        case 'Katapult':  activateBombardMode(unit);   break;
        case 'Kněz':      activateResurrection(unit);  break;
        case 'Hrdina':    activateBattleCry(unit);     break;
      }
    }

    function activateCharge(unit) {
      abilityMode = 'charge-move';
      abilityUnit = unit;
      unit.abilityUsed = true;
      const extMove = Math.max(1, unit.move + weatherMoveBonus() + 2);
      validMoves   = calculateMoveTargets(unit, extMove);
      validAttacks = []; validHeals = [];
      setMessage('⚡ Nájezd! Vyber cílové pole pohybu (dosah +2).');
      renderBoard();
    }

    function chargeMove(unit, x, y) {
      const start = getHex(unit.x, unit.y);
      const dest  = getHex(x, y);
      if (!dest || dest.unit) return;
      start.unit = null; dest.unit = unit;
      unit.x = x; unit.y = y; unit.moved = true;
      const castle = getCastleAt(x, y);
      if (castle && castle.owner !== unit.player) {
        castle.owner = unit.player;
        setMessage(`⚡ Nájezd! ${unit.nickname||unit.type} dobývá hrad!`);
        abilityMode = null; abilityUnit = null;
        endTurn(); return;
      }
      abilityMode  = 'charge-attack';
      validMoves   = [];
      validAttacks = calculateAttackTargets(unit);
      if (validAttacks.length === 0) {
        setMessage('⚡ Nájezd! Žádný nepřítel v dosahu — tah končí.');
        abilityMode = null; abilityUnit = null;
        endTurn();
      } else {
        setMessage('⚡ Nájezd! Nyní vyber nepřítele k útoku.');
        renderBoard();
      }
    }

    function activatePrecisionShot(unit) {
      unit.precisionShot = true;
      unit.abilityUsed   = true;
      const savedRange = unit.range;
      unit.range = weatherEffectiveRange(unit) * 2;
      validAttacks = calculateAttackTargets(unit);
      unit.range   = savedRange;
      validMoves   = []; validHeals = [];
      setMessage('🎯 Přesná střela! Vyber cíl (dvojitý dosah, ignoruje terén).');
      renderBoard();
    }

    function activateShieldWall(unit) {
      unit.shieldWall  = true;
      unit.abilityUsed = true;
      setMessage('🛡️ Štítová zeď! Jednotka chrání pozici — přijímá -2 poškození.');
      endTurn();
    }

    function activateBombardMode(unit) {
      abilityMode  = 'bombard';
      abilityUnit  = unit;
      unit.abilityUsed = true;
      const range  = weatherEffectiveRange(unit);
      validAttacks = hexesInRange(unit.x, unit.y, range)
        .filter(h => !(h.x === unit.x && h.y === unit.y))
        .map(h => ({ x: h.x, y: h.y }));
      validMoves   = []; validHeals = [];
      setMessage('💥 Bombardování! Vyber střed útoku (AoE — zasáhne i sousedy).');
      renderBoard();
    }

    function performBombardment(unit, cx, cy) {
      setMusicMood('dramatic');
      abilityMode  = null; abilityUnit = null;
      unit.attacked = true;
      const aoeHexes = [{ x: cx, y: cy }, ...neighbors(cx, cy)];
      const toKill = [];
      let hitCount = 0;
      aoeHexes.forEach(pos => {
        flashTile(pos.x, pos.y);
        const h = getHex(pos.x, pos.y);
        if (!h?.unit || h.unit.player === unit.player) return;
        const dmg = Math.max(0, unit.attack - (h.unit.shieldWall ? 2 : 0));
        h.unit.hp = Math.max(0, h.unit.hp - dmg);
        hitCount++;
        if (h.unit.hp <= 0) {
          unit.kills++;
          killLog.push({
            killerType: unit.type, killerPlayer: unit.player,
            killerNickname: unit.nickname || null,
            victimType: h.unit.type, victimPlayer: h.unit.player,
            victimNickname: h.unit.nickname || null,
          });
          toKill.push(h.unit);
        }
      });
      checkPromotion(unit);
      toKill.forEach(u => removeUnit(u));
      setMessage(`💥 Bombardování! Zasaženo ${hitCount} nepřátel.${toKill.length ? ' Zničeny: ' + toKill.map(u=>u.nickname||u.type).join(', ') + '!' : ''}`);
      endTurn();
    }

    function activateResurrection(priest) {
      if (priest.resurrectionUsed) return;
      const dead = lastKilledFriendly[priest.player];
      if (!dead) { setMessage('Žádná padlá spojenecká jednotka!'); return; }
      const freeHex = neighbors(priest.x, priest.y)
        .map(p => getHex(p.x, p.y)).find(h => h && !h.unit && !isRiver(h.x, h.y));
      if (!freeHex) { setMessage('Není volné sousední pole pro oživení!'); return; }
      const revived = {
        ...dead, id: `${priest.player}-rev-${Date.now()}`,
        x: freeHex.x, y: freeHex.y, hp: 3,
        moved: true, attacked: true, abilityUsed: true,
      };
      units.push(revived);
      freeHex.unit = revived;
      lastKilledFriendly[priest.player] = null;
      priest.resurrectionUsed = true;
      priest.abilityUsed      = true;
      const name = dead.nickname || dead.type;
      showAnnounce(`✝️ ${name} povstává z mrtvých!`, 2800);
      setMessage(`Kněz oživil ${name} s 3 HP!`);
      endTurn();
    }

    // ── AI ability helpers ───────────────────────────────────────────────────
    function calculateAttackTargetsAt(unit, x, y) {
      const sx = unit.x, sy = unit.y;
      unit.x = x; unit.y = y;
      const t = calculateAttackTargets(unit);
      unit.x = sx; unit.y = sy;
      return t;
    }

    function aiUseAbilities(aiUnits) {
      for (const u of aiUnits) {
        if (u.type === 'Kněz' && !u.abilityUsed && !u.resurrectionUsed && lastKilledFriendly[2]) {
          activateResurrection(u); return true;
        }
      }
      for (const u of aiUnits) {
        if (u.type !== 'Katapult' || u.abilityUsed) continue;
        const range = weatherEffectiveRange(u);
        let best = null, bestCount = 1;
        hexesInRange(u.x, u.y, range).forEach(h => {
          if (h.x === u.x && h.y === u.y) return;
          const aoe = [h, ...neighbors(h.x, h.y).map(p => getHex(p.x, p.y)).filter(Boolean)];
          const count = aoe.filter(ah => ah.unit && ah.unit.player !== u.player).length;
          if (count > bestCount) { bestCount = count; best = h; }
        });
        if (best) { u.abilityUsed = true; performBombardment(u, best.x, best.y); return true; }
      }
      for (const u of aiUnits) {
        if (u.type !== 'Rytíř' || u.abilityUsed) continue;
        const normalMoves   = calculateMoveTargets(u);
        const normalAttacks = calculateAttackTargets(u);
        if (normalAttacks.length > 0) continue;
        const extMove = Math.max(1, u.move + weatherMoveBonus() + 2);
        for (const pos of calculateMoveTargets(u, extMove)) {
          if (normalMoves.some(m => m.x === pos.x && m.y === pos.y)) continue;
          const attacks = calculateAttackTargetsAt(u, pos.x, pos.y);
          if (attacks.length > 0) {
            u.abilityUsed = true;
            const enemies = units.filter(eu => attacks.some(a => a.x === eu.x && a.y === eu.y));
            enemies.sort((a,b) => (a.rank===3?1:-1) - (b.rank===3?1:-1) || a.hp - b.hp);
            const start = getHex(u.x, u.y), dest = getHex(pos.x, pos.y);
            if (!dest || dest.unit) continue;
            start.unit = null; dest.unit = u; u.x = pos.x; u.y = pos.y; u.moved = true;
            const castle = getCastleAt(pos.x, pos.y);
            if (castle && castle.owner !== u.player) { castle.owner = u.player; endTurn(); return true; }
            setMessage(`⚡ AI Nájezd! ${u.nickname||u.type} útočí.`);
            performAttack(u, enemies[0]); return true;
          }
        }
      }
      for (const u of aiUnits) {
        if (u.type !== 'Lučištník' || u.abilityUsed) continue;
        if (calculateAttackTargets(u).length > 0) continue;
        const savedR = u.range; u.range = weatherEffectiveRange(u) * 2;
        const dblTargets = calculateAttackTargets(u); u.range = savedR;
        if (dblTargets.length > 0) {
          const enemies = units.filter(eu => dblTargets.some(a => a.x === eu.x && a.y === eu.y));
          enemies.sort((a,b) => a.hp - b.hp);
          u.abilityUsed = true;
          performAttack(u, enemies[0], true); return true;
        }
      }
      for (const u of aiUnits) {
        if (u.type !== 'Pěšák' || u.abilityUsed) continue;
        if (u.hp < u.maxHp * 0.4) { activateShieldWall(u); return true; }
      }
      // Hero: use Battle Cry if there are allies in range and enemies to attack
      for (const u of aiUnits) {
        if (!u.isHero || u.abilityUsed || u.heroLevel < 2) continue;
        const nearby = aiUnits.filter(a => a.id !== u.id && hexDistance(a, u) <= 2);
        if (nearby.length > 0 && calculateAttackTargets(u).length > 0) {
          activateBattleCry(u);
          return false; // don't end turn — hero continues
        }
      }
      return false;
    }

    // ── Hex math ─────────────────────────────────────────────────────────────
    function hexDistance(a, b) {
      const ac = offsetToCube(a.x, a.y);
      const bc = offsetToCube(b.x, b.y);
      return (Math.abs(ac.x - bc.x) + Math.abs(ac.y - bc.y) + Math.abs(ac.z - bc.z)) / 2;
    }

    function offsetToCube(x, y) {
      const x_cube = x - (y - (y & 1)) / 2;
      const z_cube = y;
      return { x: x_cube, y: -x_cube - z_cube, z: z_cube };
    }

    // ── Weather helpers ──────────────────────────────────────────────────────
    function weatherMoveBonus() {
      if (currentWeather.id === 'dest' || currentWeather.id === 'boure') return -1;
      if (currentWeather.id === 'slunecno') return 1;
      return 0;
    }

    function weatherEffectiveRange(unit) {
      if (currentWeather.id === 'mlha' && (unit.type === 'Lučištník' || unit.type === 'Katapult')) return 1;
      if (currentWeather.id === 'boure') return Math.max(1, unit.range - 1);
      return unit.range;
    }

    function weatherSightBonus() {
      return currentWeather.id === 'mlha' ? -1 : 0;
    }

    function applyWeatherStartOfTurn(player) {
      if (currentWeather.id === 'boure') {
        const victims = units.filter(u => u.player === player && getTerrainAt(u.x, u.y) === 'Kopec');
        const killed  = [];
        victims.forEach(u => { u.hp = Math.max(0, u.hp - 1); if (u.hp === 0) killed.push(u); });
        killed.forEach(u => removeUnit(u));
        if (victims.length) setMessage(`⚡ Bouře! ${victims.length} jednotka(y) na kopci zasažena bleskem!`);
      }
      if (currentWeather.id === 'slunecno') {
        const healed = units.filter(u => u.player === player && u.hp < u.maxHp);
        healed.forEach(u => { u.hp = Math.min(u.maxHp, u.hp + 1); });
        if (healed.length) setMessage(`☀️ Sluníčko! Morálka posílena — ${healed.map(u=>u.type).join(', ')} +1 HP.`);
      }
    }

    function changeWeather() {
      const options = WEATHER_TYPES.filter(w => w.id !== currentWeather.id);
      currentWeather = options[Math.floor(Math.random() * options.length)];
      weatherTurnCounter = 0;
      showAnnounce(WEATHER_ANNOUNCES[currentWeather.id]);
      updateWeatherUI();
    }

    function showAnnounce(text, duration = 2800) {
      const el = document.getElementById('weatherAnnounce');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(showAnnounce._timer);
      showAnnounce._timer = setTimeout(() => el.classList.remove('show'), duration);
    }

    function updateWeatherUI() {
      const remaining = WEATHER_CHANGE_INTERVAL - weatherTurnCounter;
      const suffix    = remaining === 1 ? 'tah' : remaining < 5 ? 'tahy' : 'tahů';
      const timerTxt  = `Za ${remaining} ${suffix} se změní`;
      // Right panel badge
      document.getElementById('wIcon').textContent  = currentWeather.icon;
      document.getElementById('wName').textContent  = currentWeather.name;
      document.getElementById('wDesc').textContent  = currentWeather.desc;
      document.getElementById('wTimer').textContent = timerTxt;
      // Left panel
      document.getElementById('wIconL').textContent  = currentWeather.icon;
      document.getElementById('wNameL').textContent  = currentWeather.name;
      document.getElementById('wDescL').textContent  = currentWeather.desc;
      document.getElementById('wTimerL').textContent = timerTxt;
    }

    // ── Fog of War ────────────────────────────────────────────────────────────
    function hexesInRange(cx, cy, range) {
      return hexes.filter(h => hexDistance({ x: cx, y: cy }, h) <= range);
    }

    function computeVisible(player) {
      const vis      = new Set();
      const unitSight = Math.max(1, 2 + weatherSightBonus());
      units.filter(u => u.player === player).forEach(u => {
        hexesInRange(u.x, u.y, unitSight).forEach(h => vis.add(`${h.x},${h.y}`));
      });
      castles.filter(c => c.owner === player).forEach(c => {
        hexesInRange(c.x, c.y, 1).forEach(h => vis.add(`${h.x},${h.y}`));
      });
      return vis;
    }

    function updateFog(player) {
      currentVisible = computeVisible(player);
      currentVisible.forEach(key => {
        explored[player].add(key);
        const [x, y] = key.split(',').map(Number);
        const hex    = getHex(x, y);
        const enemy  = hex.unit && hex.unit.player !== player ? hex.unit : null;
        if (enemy && isUnitVisibleTo(enemy, player)) {
          lastKnownEnemies[player].set(key, {
            symbol: enemy.symbol, player: enemy.player,
            hp: enemy.hp, maxHp: enemy.maxHp, type: enemy.type,
            rank: enemy.rank, nickname: enemy.nickname, isHero: enemy.isHero || false,
            isSpy: enemy.isSpy || false,
          });
        } else if (!enemy || !isUnitVisibleTo(enemy, player)) {
          lastKnownEnemies[player].delete(key);
        }
      });
    }

    function neighbors(x, y) {
      const offsets = (y % 2 === 0)
        ? [{dx:-1,dy:0},{dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},{dx:0,dy:1}]
        : [{dx:-1,dy:0},{dx:-1,dy:-1},{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:1}];
      return offsets
        .map(o => ({ x: x + o.dx, y: y + o.dy }))
        .filter(p => p.x >= 0 && p.x < 9 && p.y >= 0 && p.y < 9);
    }

    function makeCastleMarker(castle) {
      const marker = document.createElement('div');
      marker.className = `castle-marker owner-${castle.owner}`;
      marker.textContent = '🏰';
      return marker;
    }

    function makeUnitEl(unit, ghost = false) {
      const el  = document.createElement('div');
      let cls   = `unit player${unit.player}`;
      if (ghost) cls += ' ghost';
      if (!ghost && unit.rank === 3) cls += ' rank-legend';
      if (unit.isHero) cls += ' hero';
      el.className = cls;
      const svgMarkup = UNIT_SVGS[unit.type];
      if (svgMarkup) {
        el.innerHTML = svgMarkup;
      } else {
        el.textContent = unit.symbol;
      }
      if (unit.isHero) {
        const crown = document.createElement('div');
        crown.className = 'hero-crown';
        crown.textContent = '♛';
        el.appendChild(crown);
      }
      if (unit.rank > 0) {
        const stars = document.createElement('div');
        stars.className = 'unit-stars';
        stars.textContent = RANK_ICONS[unit.rank];
        el.appendChild(stars);
      }
      const hp = document.createElement('span');
      hp.className = 'hp-badge';
      hp.textContent = unit.hp;
      el.appendChild(hp);
      return el;
    }

    function renderBoard() {
      const fogPlayer = aiEnabled ? 1 : currentPlayer;
      updateFog(fogPlayer);

      boardElement.querySelectorAll('.hex').forEach(hexEl => {
        const x   = parseInt(hexEl.dataset.x, 10);
        const y   = parseInt(hexEl.dataset.y, 10);
        const key = `${x},${y}`;
        const hex = getHex(x, y);
        const tile = hex.tile;

        hexEl.classList.remove('fog-hidden', 'fog-explored');
        tile.classList.remove('highlight', 'move-target', 'attack-target', 'heal-target', 'attack-reveal');
        tile.querySelectorAll('.unit, .castle-marker').forEach(el => el.remove());

        const isVisible  = currentVisible.has(key);
        const isExplored = explored[fogPlayer].has(key);

        // Attack-reveal override: enemy struck from fog — show them with red pulse
        if (attackReveal.has(key) && !isVisible) {
          const castle = getCastleAt(x, y);
          if (castle) tile.appendChild(makeCastleMarker(castle));
          tile.classList.add('attack-reveal');
          const h = getHex(x, y);
          if (h.unit && h.unit.player !== fogPlayer) tile.appendChild(makeUnitEl(h.unit));
          return;
        }

        if (!isExplored) {
          hexEl.classList.add('fog-hidden');
          return;
        }

        if (!isVisible) {
          hexEl.classList.add('fog-explored');
          const castle = getCastleAt(x, y);
          if (castle) tile.appendChild(makeCastleMarker(castle));
          const ghost = lastKnownEnemies[fogPlayer].get(key);
          if (ghost) tile.appendChild(makeUnitEl(ghost, true));
          return;
        }

        const castle = getCastleAt(x, y);
        if (castle) tile.appendChild(makeCastleMarker(castle));

        if (selectedUnit && selectedUnit.x === x && selectedUnit.y === y) tile.classList.add('highlight');
        if (validMoves.some(p   => p.x === x && p.y === y)) tile.classList.add('move-target');
        if (validAttacks.some(p => p.x === x && p.y === y)) tile.classList.add('attack-target');
        if (validHeals.some(p   => p.x === x && p.y === y)) tile.classList.add('heal-target');

        if (hex.unit) {
          // Spy stealth: hide enemy spy unless an adjacent friendly can see it
          const spyHidden = hex.unit.isSpy && hex.unit.player !== fogPlayer && !isSpyVisibleTo(hex.unit, fogPlayer);
          if (!spyHidden) {
            const unitEl = makeUnitEl(hex.unit);
            // Own spy: semi-transparent to indicate stealth mode
            if (hex.unit.isSpy && hex.unit.player === fogPlayer) {
              unitEl.classList.add('spy-own');
              if (hex.unit.sabotageCount > 0) {
                const sb = document.createElement('div');
                sb.className = 'sabot-badge';
                sb.textContent = `🏰${hex.unit.sabotageCount}/2`;
                unitEl.appendChild(sb);
              }
            }
            tile.appendChild(unitEl);
            if (pendingMoveAnim && hex.unit.id === pendingMoveAnim.unitId) {
              const { fromRect } = pendingMoveAnim;
              pendingMoveAnim = null;
              const toRect = unitEl.getBoundingClientRect();
              const dx = fromRect.left - toRect.left;
              const dy = fromRect.top  - toRect.top;
              if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                unitEl.style.transform  = `translate(${dx}px, ${dy}px)`;
                unitEl.style.transition = 'none';
                requestAnimationFrame(() => requestAnimationFrame(() => {
                  unitEl.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                  unitEl.style.transform  = '';
                  setTimeout(() => { unitEl.style.transition = ''; }, 320);
                }));
              }
            }
          }
        }
      });
      updateStatus();
    }

    function updateStatus() {
      turnText.textContent = `Hráč ${currentPlayer} ${currentPlayer === 1 ? '(žlutý)' : '(modrý)'}`;

      // Right panel: unit list for both players
      const castleInfo = castles.map(c =>
        `Hrad ${castles.indexOf(c)+1}: ${c.owner === 1 ? '🟡 H1' : '🔵 H2'}`
      ).join(' · ');

      let html = `<div style="font-size:0.62rem;color:#9a9080;padding:2px 0 8px">${castleInfo}</div>`;

      for (const pNum of [1, 2]) {
        const color  = pNum === 1 ? '#d9be83' : '#739cc6';
        const pUnits = units.filter(u => u.player === pNum);
        html += `<div class="unit-list-hdr" style="color:${color}">Hráč ${pNum} ${pNum===1?'(žlutý)':'(modrý)'}</div>`;
        if (pUnits.length === 0) {
          html += `<div style="font-size:0.7rem;color:#6a6058;margin-bottom:8px">— žádné jednotky —</div>`;
        } else {
          pUnits.forEach(unit => {
            const pct   = Math.max(0, Math.min(100, Math.round(unit.hp / unit.maxHp * 100)));
            const dname = unit.nickname ? `<span title="${unit.type}">${unit.nickname}</span>` : unit.type;
            const stars = unit.rank > 0 ? `<span class="ur-stars">${RANK_ICONS[unit.rank]}</span>` : '';
            const heroMark = unit.isHero ? `<span style="color:#f0d060;font-size:0.7rem;margin-left:2px">♛</span>` : '';
            let xpBarHtml = '';
            if (unit.isHero) {
              const lvl = unit.heroLevel;
              const xpNeeded = lvl === 1 ? HERO_XP_L2 : lvl === 2 ? (HERO_XP_L3 - HERO_XP_L2) : 0;
              const xpCur    = lvl === 1 ? unit.xp : lvl === 2 ? (unit.xp - HERO_XP_L2) : 0;
              const xpPct    = xpNeeded > 0 ? Math.min(100, Math.round(xpCur / xpNeeded * 100)) : 100;
              const xpLabel  = lvl < 3 ? `${xpCur}/${xpNeeded} XP·Lv${lvl}` : `Lv3 MAX`;
              xpBarHtml = `<div class="xp-bar-row">
                <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
                <span class="xp-bar-txt">${xpLabel}</span>
              </div>`;
            }
            html += `<div class="unit-row" data-unit-id="${unit.id}">
              <div class="unit-row-top">
                <span class="ur-icon" style="color:${color}">${unit.symbol}</span>
                <span class="ur-name" style="color:${color}">${dname}</span>
                ${heroMark}${stars}
                <span class="ur-kills">${unit.kills}💀</span>
              </div>
              <div class="hp-bar-row">
                <div class="hp-bar-bg"><div class="hp-bar-fill p${pNum}" style="width:${pct}%"></div></div>
                <span class="hp-bar-txt">${unit.hp}/${unit.maxHp}</span>
              </div>
              ${xpBarHtml}
            </div>`;
          });
        }
      }
      unitStatus.innerHTML = html;

      if (!units.some(u => u.player === currentPlayer)) checkGameOver();
    }

    function setMessage(text) {
      message.textContent = text;
      pushLog(text);
    }

    // ── Button listeners ─────────────────────────────────────────────────────
    aiToggleBtn.addEventListener('click', () => {
      aiEnabled = !aiEnabled;
      aiToggleBtn.textContent = `AI: ${aiEnabled ? 'Zapnuto' : 'Vypnuto'}`;
      startTurnTimer(turnSecondsLeft);
    });

    aiDifficultyBtn.addEventListener('click', () => {
      aiDifficulty = aiDifficulty === 'easy' ? 'medium' : aiDifficulty === 'medium' ? 'hard' : 'easy';
      updateAiDifficultyButton();
      setMessage(`Obtížnost AI: ${aiDifficulty === 'easy' ? 'Lehká' : aiDifficulty === 'medium' ? 'Střední' : 'Těžká'}.`);
    });

    turnLimitBtn.addEventListener('click', () => {
      turnLimitEnabled = !turnLimitEnabled;
      updateTurnLimitButton();
      startTurnTimer(turnLimitEnabled ? TURN_LIMIT_SECONDS : turnSecondsLeft);
    });

    musicToggleBtn.addEventListener('click', () => setMusicEnabled(!musicEnabled));
    musicVolumeEl.addEventListener('input', (e) => setMusicVolume(Number(e.target.value) / 100));
    window.addEventListener('pointerdown', unlockMusicOnce, { passive: true });

    restartButton.addEventListener('click', () => {
      createGame();
      resetMusicForNewGame();
    });

    document.getElementById('statsRestart').addEventListener('click', () => {
      createGame();
      resetMusicForNewGame();
    });
    document.getElementById('statsClose').addEventListener('click', () => {
      const screen = document.getElementById('statsScreen');
      screen.classList.remove('visible');
      setTimeout(() => screen.classList.add('hidden'), 500);
    });

    // ── Board hover: attack preview tooltip ───────────────────────────────────
    boardElement.addEventListener('mouseover', (e) => {
      if (!selectedUnit) { hideTooltip(); return; }
      const hexEl = e.target.closest('.hex');
      if (!hexEl) { hideTooltip(); return; }
      const x = parseInt(hexEl.dataset.x, 10);
      const y = parseInt(hexEl.dataset.y, 10);
      const hex = getHex(x, y);
      if (!hex) return;
      if (hex.unit && hex.unit.player !== selectedUnit.player) {
        if (validAttacks.some(p => p.x === x && p.y === y)) {
          showTooltip(e.clientX, e.clientY,
            buildAttackTooltipHtml(selectedUnit, hex.unit, selectedUnit.precisionShot), 200);
          return;
        }
      }
      hideTooltip();
    });
    boardElement.addEventListener('mousemove', (e) => {
      if (gameTooltipEl.classList.contains('show')) {
        const w = 258, h = 180;
        let left = e.clientX + 14, top = e.clientY + 14;
        if (left + w > window.innerWidth)  left = e.clientX - w - 8;
        if (top  + h > window.innerHeight) top  = e.clientY - h - 8;
        gameTooltipEl.style.left = left + 'px';
        gameTooltipEl.style.top  = top  + 'px';
      }
    });
    boardElement.addEventListener('mouseleave', hideTooltip);

    // ── Unit list hover: ability tooltip ─────────────────────────────────────
    unitStatus.addEventListener('mouseover', (e) => {
      const row = e.target.closest('[data-unit-id]');
      if (!row) { hideTooltip(); return; }
      const unit = units.find(u => u.id === row.dataset.unitId);
      if (!unit) return;
      const html = buildAbilityTooltip(unit);
      if (html) showTooltip(e.clientX, e.clientY, html);
    });
    unitStatus.addEventListener('mousemove', (e) => {
      if (gameTooltipEl.classList.contains('show')) {
        const w = 258, h = 180;
        let left = e.clientX + 14, top = e.clientY + 14;
        if (left + w > window.innerWidth)  left = e.clientX - w - 8;
        if (top  + h > window.innerHeight) top  = e.clientY - h - 8;
        gameTooltipEl.style.left = left + 'px';
        gameTooltipEl.style.top  = top  + 'px';
      }
    });
    unitStatus.addEventListener('mouseleave', hideTooltip);

    setMusicButtonState();
    setMusicVolume(Number(musicVolumeEl.value) / 100);
    ensureMusicPlaying();
    updateTurnLimitButton();
    updateAiDifficultyButton();
    updateTurnTimerUI();
    createGame();
  </script>
</body>
</html>
